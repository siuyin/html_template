<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Gerbau</title>
    <link rel="stylesheet" href="styles.css">
    <script src="main.js"></script>
    <script type="module" src="https://cdn.jsdelivr.net/gh/starfederation/datastar@1.0.0-RC.8/bundles/datastar.js"></script>
    <script src="https://kit.fontawesome.com/916df9b004.js" crossorigin="anonymous"></script>
  </head>
  <body>

    <h1>Gerbau</h1>
    <div style="display: flex; gap: var(--size-6); align-items: center; ">
      <p>The quick brown fox jumps over the lazy dog. 
      <br>House in Tamil is: வீடு
      <br>I can speak Chinese: 我会说中文
      <br>My name is Loh Siu Yin: 我的名是罗修仁
      </p>

      <!-- <p id="gerbau" class="spinner spin"></p> -->
    </div>

    <div id="spinner_div" style="display: flex; gap: var(--size-6); align-items: center; ">
      <div>
        <p style="margin-bottom:0;">The quick brown fox jumps over the lazy dog:</p>
        <div style="display:flex; gap: var(--size-6);" data-signals:jumping=false>
          <button class="bigbtn" data-on:click="$jumping=true; spin_round($jumping)" data-attr:disabled="$jumping">Start jumping</button>
          <button class="bigbtn impt" data-on:click="$jumping=false; spin_round($jumping)" data-attr:disabled="!$jumping">Stop jumping</button>
        </div>
      </div>
      <!-- <div id="jumping_indicator" style="display:none" data-show="$jumping"><img src="fox_489994.png" width="48px"></div>
      -->
    </div>
    <div id="jumping_indicator" style="display:none" data-show="$jumping"><img src="fox.png" width="128px" ></div>

    <footer style="margin-top: var(--size-10); font-size: var(--font-size-0)">
      <a href="https://www.flaticon.com/free-icons/cute" title="cute icons">Cute icons created by Merchadew - Flaticon</a>
    </footer>
  </body>
</html>
