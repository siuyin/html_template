<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Template</title>
    <link rel="stylesheet" href="styles.css">
    <script src="main.js"></script>
    <script type="module" src="https://cdn.jsdelivr.net/gh/starfederation/datastar@1.0.0-RC.8/bundles/datastar.js"></script>
    <script src="https://kit.fontawesome.com/916df9b004.js" crossorigin="anonymous"></script>
  </head>
  <body style="display:flex; flex-direction:column;">

    <div style="flex-grow:1">
      <h1 style="margin-bottom:0;">My HTML Template</h1>
      <div style="display: flex; gap: var(--size-6); align-items: center; ">
        <p><span style="font-weight: var(--font-weight-7);">Using Noto Sans Tamil (தமிழ்) from Google Fonts</span>
        <br>It renders English and Chinese text equally well.
        <br>I can speak Chinese: 我会说中文
        <br>My name is Loh Siu Yin: 我的名是罗修仁
        <br>House in Tamil is: வீடு
        </p>

      </div>

      <div id="spinner_div" style="display: flex; gap: var(--size-6); align-items: center; ">
        <div>
          <p style="margin-bottom:0;">The quick brown fox jumps over the lazy dog:</p>
          <div style="display:flex; gap: var(--size-6);" data-signals:jumping=false>
            <button class="bigbtn" data-on:click="$jumping=true; jumping($jumping)" data-attr:disabled="$jumping">Start jumping</button>
            <button class="bigbtn impt" data-on:click="$jumping=false; jumping($jumping)" data-attr:disabled="!$jumping">Stop jumping</button>
          </div>

          <div style="margin-top: var(--size-4); display:flex; gap: var(--size-6);" data-signals:spin=false >
            <button class="bigbtn" data-on:click="$spin=true; spin($spin)" data-attr:disabled="$spin">Start spinning</button>
            <button class="bigbtn impt" data-on:click="$spin=false; spin($spin)" data-attr:disabled="!$spin">Stop spinning</button>
          </div>

        </div>
      </div>

      <div>
        <div id="jumping_indicator" style="margin-top: var(--size-4); display:none" data-show="$jumping"><img src="fox.png" width="128px" ></div>
        <div id="spinning_indicator" style="margin-top: var(--size-4); display:none" data-show="$spin"></div>
        <div id="time"></div>
      </div>
    </div>

    <div data-init="@get('/time')"></div>
    <footer style="margin-top: var(--size-2); font-size: var(--font-size-0)">
      <a href="https://www.flaticon.com/free-icons/cute" title="cute icons">Cute icons created by Merchadew - Flaticon</a>
    </footer>
  </body>
</html>
